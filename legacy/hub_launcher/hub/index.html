<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyrypa Ultra-Trekking Hub</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { font-size: 1.5rem; background: linear-gradient(to right, #a3e635, #22d3ee); -webkit-background-clip: text; color: transparent; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #94a3b8; font-style: italic; margin-top: 0; margin-bottom: 20px; }
        .route-card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #334155; }
        .route-title { font-weight: bold; font-size: 1.1rem; }
        .route-meta { font-size: 0.85rem; color: #cbd5e1; }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-launch { background: #a3e635; color: #0f172a; }
        .btn-download { background: #3b82f6; color: white; }
        .btn-update { background: #eab308; color: #0f172a; }
        .btn-disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        #status { font-size: 0.85rem; color: #94a3b8; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <h1>Wyrypa Ultra-Trekking</h1>
    <p class="subtitle">Cloud Shell Downloader</p>

    <div id="routes-container"></div>
    <div id="status">Initializing...</div>

    <script src="bundle.js"></script>
</body>
</html>
